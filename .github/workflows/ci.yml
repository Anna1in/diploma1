name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  # --- ТЕСТУВАННЯ БЕКЕНДУ ---
  test-backend:
    name: Backend CI
    runs-on: ubuntu-latest
    # Використовуємо змінні середовища з GitHub Secrets
    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      JWT_SECRET: "test_secret_for_ci" # Можна задати фіксований для тестів
      NODE_ENV: test

    steps:
      # Завантажуємо код з репозиторію
      - name: Checkout code
        uses: actions/checkout@v4

      # Встановлюємо Node.js 20 версії
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package.json

      # Встановлюємо залежності саме в папці backend
      - name: Install dependencies
        run: npm install
        working-directory: ./backend

      # Перевірка стилю коду (Linting)
      - name: Run ESLint
        run: npm run lint || echo "Linting failed, but continuing tests"
        working-directory: ./backend

      # Запуск тестів з генерацією звіту про покриття
      - name: Run Backend Tests
        run: npm test -- --coverage
        working-directory: ./backend

  # --- ТЕСТУВАННЯ ФРОНТЕНДУ ---
  test-frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    needs: [] # Запускається паралельно з бекендом

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install
        working-directory: ./frontend

      - name: Run ESLint
        run: npm run lint || echo "Linting failed"
        working-directory: ./frontend

      # Запуск тестів Vitest/React Testing Library
      - name: Run Frontend Tests
        run: npm run test:coverage
        working-directory: ./frontend
