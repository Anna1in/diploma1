name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  # --- BACKEND JOB ---
  test-backend:
    name: Backend CI
    runs-on: ubuntu-latest
    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      JWT_SECRET: "test_secret_for_ci"
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # ПЕРЕВІРТЕ: папка має називатися backend
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci # Використовуємо npm ci для чистих збірок в CI
        working-directory: ./server

      - name: Run Backend Tests
        run: npm test -- --coverage
        working-directory: ./server

  # --- FRONTEND JOB ---
  test-frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # ПЕРЕВІРТЕ: якщо папка називається client, змініть на client/package-lock.json
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./client

      - name: Run Frontend Tests
        run: npm run test:coverage
        working-directory: ./client