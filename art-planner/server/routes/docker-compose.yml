services:
  server:
    build: ../
    container_name: diploma-backend
    ports:
      - "5000:5000"
    env_file:
      - ../.env
    volumes:
      - ./server/uploads:/app/uploads
      - ./server/results:/app/results
    depends_on:
      - mongodb

  mongodb:
    image: mongo:6.0
    container_name: diploma-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: